<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboardassi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
</head>

<body class="flex min-h-screen">
    <main class="w-full flex">
        <section class="w-full max-w-[300px]  bg-blue-950 border-2 flex flex-col">
            <div>
                <h1 class="text-white text-center pt-2 bg-black font-bold text-lg h-12">📱Mobile Shop</h1>
            </div>
            <div class="flex flex-col gap-2 p-4 w-full h-10">
                <p class="text-slate-400">MANAGEMENT</p>
                <a href="#" class="text-sm bg-pink-400 text-white py-3 rounded-lg pl-2">Dashboard</a>
                <a href="#" class="text-sm text-white p-2">Products</a>
                <a href="#" class="text-sm text-white p-2">Orders</a>
                <a href="#" class="text-sm text-white p-2">Users</a>
            </div>
            <div class="mt-auto p-4 border-2 border-slate-600">
                <button class="w-full transition py-3 rounded-lg mt-auto bg-slate-500 text-white">Logout</button>
            </div>
        </section>
        <section class="flex flex-col bg-slate-400 w-full mx-auto space-y-6 space-x-5">
            <div>
                <h1 class="w-full text-black text-lg">Dashboard</h1>

            </div>
            <div class="grid grid-cols-4 space-x-5 px-5  ">
                <div class="bg-white flex border rounded-lg items-center pl-5 gap-6">
                    <!-- <img src="images/coin.png" alt="" class="w-5 h-5 border-2"> -->
                    <button class="w-8 h-8 border-2 bg-green-300">💲</button>
                    <div class="flex flex-col">
                        <p>Total Sales</p>
                        <h1 class="font-bold text-3xl">$0.00</h1>
                    </div>
                </div>

                <div class="bg-white flex border rounded-lg items-center pl-5 gap-6">
                    <button class="w-8 h-8 border-2 bg-blue-400">🛒</button>
                    <div class="flex flex-col">
                        <p>Total Orders</p>
                        <h1 class="font-bold text-3xl">0</h1>
                    </div>
                </div>
                <div class="bg-white flex border rounded-lg items-center pl-5 gap-6">
                    <button class="w-8 h-8 border-2 bg-purple-400">👥</button>
                    <div class="flex flex-col">
                        <p>Customers</p>
                        <h1 class="font-bold text-3xl">1</h1>
                    </div>
                </div>
                <div class="bg-white flex border rounded-lg items-center pl-5 gap-6">
                    <button class="w-8 h-8 border-2 bg-red-400 text-center">⚠️</button>
                    <div class="flex flex-col">

                        <p>Low Stock Items</p>
                        <h1 class="font-bold text-3xl">0</h1>
                    </div>
                </div>

            </div>
            <div>
                <div class="bg-white rounded-lg border-2 px-5 flex flex-col mx-5 justify-between">
                    <div class="flex justify-between">
                        <p>Recent Orders</p>
                        <a href="" alt="" class="text-purple-600">View all >></a>
                    </div>
                </div>

                <div class="bg-white rounded-lg border-2 px-5 mx-5 flex justify-between ">
                    <table class="w-full text-left table-fixed">
                        <tr>
                            <th class="w-1/3">ORDER ID</th>
                            <th class="w-1/3">CUSTOMERS</th>
                            <th class="w-1/3">DATE</th>
                            <th class="w-1/3">TOTAL</th>
                            <th class="w-1/3">STATUS</th>
                            <th><svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="w-4 h-4 text-gray-500"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                            >
                            <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M8 9l4-4 4 4M16 15l-4 4-4-4"
                            />
                            </svg></th>
                        </tr>
                    </table>
                    <!-- <button class="text-gray-500 hover:text-blue-600 transition-colors p-1">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
    </svg>
  </button> -->

                </div>
            </div>





        </section>
    </main>
</body>

</html>
