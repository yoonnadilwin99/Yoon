<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboardassi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen text-slate-800 antialiased font-sans">
    <header class="flex items-center justify-between bg-blue-950 p-4 text-white min-[720px]:hidden sticky top-0 z-50 shadow-md">
        <h1 class="font-bold text-lg">Dashboard</h1>
        <button id="menu-toggle" class="p-2 focus:outline-none focus:bg-blue-900 rounded-lg relative z-50">
            <svg id="hamburger-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 block">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
            <svg id="close-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 hidden">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </header>

    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 min-[720px]:hidden"></div>

    <main class="w-full flex">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-blue-950 flex flex-col transform -translate-x-full transition-transform duration-300 ease-in-out min-[720px]:static min-[720px]:translate-x-0 min-[720px]:transform-none min-[720px]:block hidden">
            <div>
                <h1 class="text-white text-center pt-2 bg-black font-bold text-lg h-12">📱Mobile Shop</h1>
            </div>
            <div class="flex flex-col gap-2 p-4 w-full h-10">
                <p class="text-slate-400">MANAGEMENT</p>
                <a href="#" class="text-sm bg-pink-400 text-white py-3 rounded-lg pl-2">Dashboard</a>
                <a href="#" class="text-sm text-white p-2">Products</a>
                <a href="#" class="text-sm text-white p-2">Orders</a>
                <a href="#" class="text-sm text-white p-2">Users</a>
            </div>
            <div class="mt-auto p-4 border-2 border-slate-600">
                <button class="w-full transition py-3 rounded-lg mt-auto bg-slate-500 text-white">Logout</button>
            </div>
        </aside>
        <section class="flex flex-col bg-slate-400 w-full mx-auto space-y-6 space-x-5">
            <div>
                <h1 class="w-full text-black text-lg">Dashboard</h1>

            </div>
            <div class="grid grid-cols-4 space-x-5 px-5  ">
                <div class="bg-white flex border rounded-lg items-center pl-5 gap-6">
                    <!-- <img src="images/coin.png" alt="" class="w-5 h-5 border-2"> -->
                    <button class="w-8 h-8 border-2 bg-green-300">💲</button>
                    <div class="flex flex-col">
                        <p>Total Sales</p>
                        <h1 class="font-bold text-3xl">$0.00</h1>
                    </div>
                </div>

                <div class="bg-white flex border rounded-lg items-center pl-5 gap-6">
                    <button class="w-8 h-8 border-2 bg-blue-400">🛒</button>
                    <div class="flex flex-col">
                        <p>Total Orders</p>
                        <h1 class="font-bold text-3xl">0</h1>
                    </div>
                </div>
                <div class="bg-white flex border rounded-lg items-center pl-5 gap-6">
                    <button class="w-8 h-8 border-2 bg-purple-400">👥</button>
                    <div class="flex flex-col">
                        <p>Customers</p>
                        <h1 class="font-bold text-3xl">1</h1>
                    </div>
                </div>
                <div class="bg-white flex border rounded-lg items-center pl-5 gap-6">
                    <button class="w-8 h-8 border-2 bg-red-400 text-center">⚠️</button>
                    <div class="flex flex-col">

                        <p>Low Stock Items</p>
                        <h1 class="font-bold text-3xl">0</h1>
                    </div>
                </div>

            </div>
            <div>
                <div class="bg-white rounded-lg border-2 px-5 flex flex-col mx-5 justify-between">
                    <div class="flex justify-between">
                        <p>Recent Orders</p>
                        <a href="" alt="" class="text-purple-600">View all >></a>
                    </div>
                </div>

                <div class="bg-white rounded-lg border-2 px-5 mx-5 flex justify-between ">
                    <table class="w-full text-left table-fixed">
                        <tr>
                            <th class="w-1/3">ORDER ID</th>
                            <th class="w-1/3">CUSTOMERS</th>
                            <th class="w-1/3">DATE</th>
                            <th class="w-1/3">TOTAL</th>
                            <th class="w-1/3">STATUS</th>
                            <th><svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="w-4 h-4 text-gray-500"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                            stroke-width="2"
                            >
                            <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M8 9l4-4 4 4M16 15l-4 4-4-4"
                            />
                            </svg></th>
                        </tr>
                    </table>
                    <!-- <button class="text-gray-500 hover:text-blue-600 transition-colors p-1">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
    </svg>
  </button> -->

                </div>
            </div>





        </section>
    </main>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const hamburgerIcon = document.getElementById('hamburger-icon');
        const closeIcon = document.getElementById('close-icon');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function openSidebar() {
            sidebar.classList.remove('hidden');
            overlay.classList.remove('hidden');
            requestAnimationFrame(() => {
                sidebar.classList.remove('-translate-x-full');
            });
            hamburgerIcon.classList.add('hidden');
            hamburgerIcon.classList.remove('block');
            closeIcon.classList.remove('hidden');
            closeIcon.classList.add('block');
        }

        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
            hamburgerIcon.classList.remove('hidden');
            hamburgerIcon.classList.add('block');
            closeIcon.classList.add('hidden');
            closeIcon.classList.remove('block');
            sidebar.addEventListener('transitionend', function hideAfterTransition() {
                sidebar.classList.add('hidden');
                sidebar.removeEventListener('transitionend', hideAfterTransition);
            });
        }

        function toggleSidebar() {
            if (sidebar.classList.contains('hidden')) {
                openSidebar();
            } else {
                closeSidebar();
            }
        }

        menuToggle.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', closeSidebar);
    </script>
</body>

</html>
