<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-purple-400 flex min-h-screen items-center justify-center">
    
      <main 
        class="md-w-1/4 mx-auto rounded-2xl bg-white flex flex-col mt-10 space-y-10 max-w-md w-[40%]"
      >
        <div class="flex justify-center mt-10 items-center w-full">
          <img
            src="images/lock.png"
            alt="profile"
            class="w-10 h-10 border rounded-lg p-2 "
          />
        </div>
        <div class="w-full">
          <h1 class="font-bold text-xl text-center">Welcome Back</h1>
          <p class="text-slate-500 text-center">
            Enter your credentials to access your account
          </p>
        </div>
        <form class="space-y-6" class="w-full">
          <div class="flex flex-col space-x-3 px-5">
            <div class="flex flex-col gap-1">
              <label class="font-bold">Email Address</label>
              <input
                type="email"
                placeholder="name@company.com"
                required class="border rounded-lg px-3 py-2"
                id="emailInput"
              />
            </div>
          </div>
          <div class="flex flex-col px-5">
            <label class="font-bold">Password</label>
            <input type="password" placeholder="........" required minlength="8" class="bg-slate-300 rounded-lg px-3 py-2">
          </div>
          <div class= "grid grid-cols-2 px-5 justify-between">
            <div class="flex gap-2">
                <input type="checkbox" required class="" id="checkBox"/>
            <p>Remember me</p>
            </div>
            <div class="text-end">
                <a htef="#" class="text-blue-500 " alt="forgotPassword">Forgot Password?</a>
            </div>
          </div>
          <div class="px-5">
            <button class="bg-blue-500 text-white font-bold w-full rounded-lg py-2">Log In➡️</button>
          </div>
        </form>
        <div class="flex justify-center pb-12 gap-2 mb-10 w-full">
            <p> Don't have an account yet? </p><a herf="#" class="text-purple-600"> Sign up for free</a>
        </div>
      </main>
    
  </body>
</html>
